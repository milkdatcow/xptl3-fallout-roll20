<div class="character-sheet">
    <div class="section info">
        <div class="character-info">
            <label class="inline" for="character-name">Name</label>
            <input type="text" id="character-name" name="attr_character_name"/>
        </div>
        <div class="character-info">
            <label class="inline" for="character-race">Race</label>
            <input type="text" id="character-race" name="attr_character_race">
        </div>
        <div class="character-info">
            <label class="inline" for="character-background">Background</label>
            <input type="text" id="character-background" name="attr_character_background">
        </div>
        <span class="level-xp">
            <div class="character-info">
                <label class="inline" for="character-level">Level</label>
                <input type="number" id="character-level" name="attr_character_level">
            </div>
            <div class="character-info">
                <label class="inline" for="character-xp">XP</label>
                <input type="number" id="character-xp" name="attr_character_xp">
            </div>
        </span>
        <hr>

        <div class="character-skills">
            <h2>Skills</h2>
            <span class="skill-box">
                <button type="roll" name="roll_barter" value="&{template:skills} {{skillName=Barter}}  {{roll=[[1d20 + @{skill_barter} - @{hunger} - @{thirst} -@{exhaustion} - @{fatigue} - @{rads}]]}}">Barter</button>
                <input type="number" id="skill-barter" name="attr_skill_barter">
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_breach" value="&{template:skills} {{skillName=Breach}}  {{roll=[[1d20 + @{skill_breach}]]}}">Breach</button>
                <input type="number" id="skill-breach" name="attr_skill_breach">
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_crafting" value="&{template:skills} {{skillName=Crafting}}  {{roll=[[1d20 + @{skill_crafting}]]}}">Crafting</button>
                <input type="number" id="skill-crafting" name="attr_skill_crafting">
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_energy_weapons" value="&{template:skills} {{skillName=Energy Weapons}}  {{roll=[[1d20 + @{skill_energy_weapons}]]}}">Energy Weapons</button>
                <input type="number" id="skill-energy-weapons" name="attr_skill_energy_weapons">
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_explosives" value="&{template:skills} {{skillName=Explosives}}  {{roll=[[1d20 + @{skill_explosives}]]}}">Explosives</button>
                <input type="number" id="skill-explosives" name="attr_skill_explosives">
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_guns" value="&{template:skills} {{skillName=Guns}}  {{roll=[[1d20 + @{skill_guns}]]}}">Guns</button>
                <input type="number" id="skill-guns" name="attr_skill_guns">                
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_intimidation" value="&{template:skills} {{skillName=Intimidation}}  {{roll=[[1d20 + @{skill_intimidation}]]}}">Intimidation</button>
                <input type="number" id="skill-intimidation" name="attr_skill_intimidation">                
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_medicine" value="&{template:skills} {{skillName=Medicine}}  {{roll=[[1d20 + @{skill_medicine}]]}}">Medicine</button>
                <input type="number" id="skill-medicine" name="attr_skill_medicine">                
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_melee_weapons" value="&{template:skills} {{skillName=Melee Weapons}}  {{roll=[[1d20 + @{skill_melee_weapons}]]}}">Melee Weapons</button>
                <input type="number" id="skill-melee-weapons" name="attr_skill_melee_weapons">                
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_science" value="&{template:skills} {{skillName=Science}}  {{roll=[[1d20 + @{skill_Science}]]}}">Science</button>
                <input type="number" id="skill-science" name="attr_skill_science">
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_sneak" value="&{template:skills} {{skillName=Sneak}}  {{roll=[[1d20 + @{skill_sneak}]]}}">Sneak</button>
                <input type="number" id="skill-sneak" name="attr_skill_sneak">                
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_speech" value="&{template:skills} {{skillName=Speech}}  {{roll=[[1d20 + @{skill_speech}]]}}">Speech</button>
                <input type="number" id="skill-speech" name="attr_skill_speech">                
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_survival" value="&{template:skills} {{skillName=Survival}}  {{roll=[[1d20 + @{skill_survival}]]}}">Survival</button>
                <input type="number" id="skill-survival" name="attr_skill_survival">                
            </span>
            <span class="skill-box">
                <button type="roll" name="roll_unarmed" value="&{template:skills} {{skillName=Unarmed}}  {{roll=[[1d20 + @{skill_unarmed}]]}}">Unarmed</button>
                <input type="number" id="skill-unarmed" name="attr_skill_unarmed">
            </span>
        </div>
    </div>

    <div class="section special">
        <span class="special-scores">
            <div class="character-stat">
                <label for="strength-score">S</label>
                <button type="roll" name="roll_strength" value="&{template:skills} {{skillName=Strength}}  {{roll=[[1d20 + @{strength_mod}]]}}">S</button>
                <input class="stat-num" type="number" id="strength-score" name="attr_strength">
                <input class="stat-num-sm" type="number" id="strength-mod" name="attr_strength_mod">
            </div>
            <div class="character-stat">
                <label for="perception-score">P</label>
                <input class="stat-num" type="number" id="perception-score" name="attr_perception">
                <input class="stat-num-sm" type="number" id="perception-mod" name="attr_perception_mod">
            </div>
            <div class="character-stat">
                <label for="endurance-score">E</label>
                <input class="stat-num" type="number" id="endurance-score" name="attr_endurance">
                <input class="stat-num-sm" type="number" id="endurance-mod" name="attr_endurance_mod">
            </div>
            <div class="character-stat">
                <label for="charisma-score">C</label>
                <input class="stat-num" type="number" id="charisma-score" name="attr_charisma">
                <input class="stat-num-sm" type="number" id="charisma-mod" name="attr_charisma_mod">
            </div>
            <div class="character-stat">
                <label for="intelligence-score">I</label>
                <input class="stat-num" type="number" id="intelligence-score" name="attr_intelligence">
                <input class="stat-num-sm" type="number" id="intelligence-mod" name="attr_intelligence_mod">
            </div>
            <div class="character-stat">
                <label for="agility-score">A</label>
                <input class="stat-num" type="number" id="agility-score" name="attr_agility">
                <input class="stat-num-sm" type="number" id="agility-mod" name="attr_agility_mod">
            </div>
            <div class="character-stat">
                <label for="luck-score">L</label>
                <input class="stat-num" type="number" id="luck-score" name="attr_luck">
                <input class="stat-num-sm" type="number" id="luck-mod" name="attr_luck_mod">
            </div>
        </span>
        <hr>
        <div class="body-grid">
            <div class="slot ac">
                <span class="body-span">
                    <label for="ac-score">AC</label>
                    <input class="body-stat" type="number" id="ac-score" name="attr_ac">
                </span>
            </div>
            <div class="slot dt">
                <span class="body-span">
                    <label for="dt-score">DT</label>
                    <input class="body-stat" type="number" id="dt-score" name="attr_dt">
                </span>
            </div>
            <div class="slot decay">
                <span class="body-span">
                    <label for="armour-decay-score">Decay</label>
                    <input class="body-stat" type="number" id="armour-decay-score" name="attr_armour_decay">
                </span>
            </div>
            <div class="slot stamina">
                <span class="body-span">
                    <label for="stamina-score">Stamina</label>
                    <input class="body-stat" type="number" id="stamina-score" name="attr_stamina">
                </span>
            </div>
            <div class="slot hp">
                <span class="body-span">
                    <label for="hp-score">HP</label>
                    <input class="body-stat" type="number" id="hp-score" name="attr_hp">
                </span>
            </div>
            <div class="slot hr">
                <span class="body-span">
                    <label for="hr-score">Healing Rate</label>
                    <input class="body-stat" type="number" id="hr-score" name="attr_hr">
                </span>
            </div>
           
            <div class="slot sequence">
                <span class="body-span">
                    <label for="sequence-score">Combat Sequence</label>
                    <input class="body-stat" type="number" id="sequence-score" name="attr_sequence">
                </span>
            </div>
            <div class="slot ap">
                <span class="body-span">
                    <label for="ap-score">Action Points</label>
                    <input class="body-stat" type="number" id="ap-score" name="attr_ap">
                </span>
            </div>
            <div class="slot fatigue">
                <span class="body-span">
                    <label for="fatigue-score">Fatigue</label>
                    <input class="body-stat" type="number" id="fatigue-score" name="attr_fatigue">
                </span>
            </div>
            <div class="slot hunger">
                <span class="body-span">
                    <label for="hunger-score">Hunger</label>
                    <input class="body-stat" type="number" id="hunger-score" name="attr_hunger">
                </span>
            </div>
            <div class="slot thirst">
                <span class="body-span">
                    <label for="thirst-score">Dehydration</label>
                    <input class="body-stat" type="number" id="thirst-score" name="attr_thirst">
                </span>
            </div>
            <div class="slot exhaustion">
                <span class="body-span">
                    <label for="thirst-score">Exhaustion</label>
                    <input class="body-stat" type="number" id="exhaustion-score" name="attr_exhaustion">
                </span>
            </div>
            <div class="slot radiationdc">
                <span class="body-span">
                    <label for="radiationdc-score">Radiation DC</label>
                    <input class="body-stat" type="text" id="radiationdc-score" name="attr_radiationdc">
                </span>
            </div>
            <div class="slot rads">
                <span class="body-span">
                    <label for="rads-score">Radiation</label>
                    <input class="body-stat" type="number" id="rads-score" name="attr_rads">
                </span>
            </div>
            <div class="slot sense">
                <span class="body-span">
                    <label for="sense-score">Passive Sense</label>
                    <input class="body-stat" type="number" id="sense-score" name="attr_sense">
                </span>
            </div>
            <div class="slot nerve">
                <span class="body-span">
                    <label for="nerve-score">Party Nerve</label>
                    <input class="body-stat" type="number" id="nerve-score" name="attr_nerve">
                </span>
            </div>
            <div class="slot groupsneak">
                <span class="body-span">
                    <label for="groupsneak-score">Group Sneak</label>
                    <input class="body-stat" type="number" id="groupsneak-score" name="attr_groupsneak">
                </span>
            </div>
        </div>
        <span class="body-span">
            <label for="armourupgrades">Armour Upgrades</label>
            <textarea name="attr_armourupgrades" id="armourupgrades" class="conditions-box"></textarea>
        </span>
        <span class="body-span">
            <label for="conditions">Conditions</label>
            <textarea name="attr_conditions" id="conditions" class="conditions-box"></textarea>
        </span>
        
        
    </div>

    <div class="section weapons">
        <h2>Weapons</h2>

        <fieldset class="repeating_weapons">
            <div class="weapon-card">
                
                <input class="weapon" spellcheck="false" type="text" name="attr_weaponname" placeholder="Weapon">
                <button type="roll" name="roll_weapon"></button>
                <span class="weapon-stats">
                    <input type="text" class="ap" placeholder="AP">
                    <input type="text" class="attack" placeholder="Attack">
                    <input type="text" class="damage" placeholder="Damage">
                    <input type="text" class="range" placeholder="Range">
                </span>
                <input type="text" class="crit" placeholder="Crit">
                <input type="text" class="special" placeholder="Special Properties">
                
                <span class="ammo">
                    <label>Ammo:</label>
                    <input type="number" value="1" name="attr_ammo"></input>
                    <p class="slash">/</p>
                    <input type="number"value="1" name="attr_max_ammo"></input>
                    <button type="action"  name="act_reload">Reload</button>
                </span>
                <input type="text" class="mods" placeholder="Mods">
                <span class="decay-card">
                    <label>Levels of decay:</label>
                    <input type="number" class="decay" placeholder="Levels of Decay">
                </span>
            </div>
        </fieldset>
    </div>
    
    <div class="section perks">
        <h2>Traits & Perks</h2>
        <fieldset class="repeating_perks">
            <div class="perk-box">
                <input type="text" name="attr_name"/>
                <textarea name="attr_description"></textarea>
            </div>
        </fieldset>
    </div>

    <div class="section inventory">
        <h2>Inventory</h2>
        <span class="inventory-head">
            <div class="caps">
                <label for="caps-total">Caps</label>
                <input class="caps-number" type="number" id="caps-total" name="attr_caps"/>
            </div>
            <div class="carry-load">
                <label for="carry-load-total">Carry Load</label>
                <input class="carry-load-number" type="number" id="carry-load-total" name="attr_carry_load"/>
            </div>
        </span>
        <div class="inventory-plane">
            Item Load
            <fieldset class="repeating_invetory">
                <div class="inventory-box">
                    <input type="text" name="attr_name"/>
                    <input type="number" name="attr_load"/>
                </div>
            </fieldset>
        </div>
    </div>
</div>

<!-- roll templates -->
<rolltemplate class="sheet-rolltemplate-skills">
    <!-- todo -->
     
        
      {{#skillName}}
        <div class="sheet-skillName">
          {{skillName}}
        </div>
      {{/skillName}}
      
      
      {{#roll}}
        <div class="sheet-roll">
          {{roll}}
        </div>
      {{/roll}}
</rolltemplate>
